services:
  init-data-permissions:
    image: translator_webui-webui:latest
    container_name: novel-webui-init-data-permissions
    user: "0:0"
    command: [ "/bin/sh", "-lc", "mkdir -p /data; chown -R app:app /data || true" ]
    volumes:
      - ./data:/data
    restart: "no"

  novel-webui:
    image: translator_webui-webui:latest
    build:
      context: .
      dockerfile: Dockerfile.webui
    container_name: novel-webui
    depends_on:
      init-data-permissions:
        condition: service_completed_successfully
    ports:
      - "${WEBUI_PORT:-7860}:7860"
    env_file:
      - .env
    user: "${WEBUI_CONTAINER_USER:-app}"
    volumes:
      - ./data:/data
    restart: always
    healthcheck:
      test: [ "CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:7860/healthz', timeout=3).status == 200 else 1)" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
