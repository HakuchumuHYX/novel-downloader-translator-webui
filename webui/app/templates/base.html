<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title if title else "小说抓取与翻译 WebUI" }}</title>
  
  <!-- 引入现代无衬线字体 Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-chrome">
    <!-- 优化后的弥散渐变背景 -->
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div class="ambient ambient-c"></div>

    <header class="topbar">
      <div class="brand-group">
        <a class="brand" href="/">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
          Translator UI
        </a>
        <p class="brand-note">下载、编排、翻译与产物管理</p>
      </div>
      <div class="topbar-actions">
        <button class="nav-toggle" id="nav-toggle" type="button" aria-expanded="false" aria-controls="topbar-nav">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
      </div>
      <nav id="topbar-nav" class="topbar-nav">
        <a href="/">任务列表</a>
        <a href="/tasks/new">新建任务</a>
        <a href="/tasks/manage">任务管理</a>
        <a href="/settings">系统设置</a>
        <a href="/system">运行状态</a>
        <!-- 日夜间模式切换开关 -->
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="切换主题">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </nav>
    </header>
    
    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    (function () {
      const root = document.documentElement;
      const themeToggle = document.getElementById('theme-toggle');
      const navToggle = document.getElementById('nav-toggle');
      const storedTheme = localStorage.getItem('webui-theme');
      const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

      function applyTheme(theme) {
        root.setAttribute('data-theme', theme);
      }

      applyTheme(storedTheme || (systemDark ? 'dark' : 'light'));

      if (themeToggle) {
        themeToggle.addEventListener('click', function () {
          // 添加过渡 class 确保平滑
          root.classList.add('theme-transitioning');
          const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          localStorage.setItem('webui-theme', next);
          applyTheme(next);
          
          setTimeout(() => {
            root.classList.remove('theme-transitioning');
          }, 300);
        });
      }

      if (navToggle) {
        navToggle.addEventListener('click', function () {
          document.body.classList.toggle('nav-open');
          navToggle.setAttribute('aria-expanded', document.body.classList.contains('nav-open') ? 'true' : 'false');
        });
      }

      // 为了更好的交互体验，高亮当前页面的导航项
      const currentPath = window.location.pathname;
      const navLinks = document.querySelectorAll('.topbar-nav a');
      navLinks.forEach(link => {
        if (link.getAttribute('href') === currentPath || (currentPath !== '/' && link.getAttribute('href').startsWith(currentPath) && link.getAttribute('href') !== '/')) {
          link.classList.add('active');
        }
      });
    })();
  </script>
</body>
</html>
